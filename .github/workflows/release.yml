name: Release

# Cut a release by pushing a version tag, e.g.:  git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the release and upload the .dmg

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select newest installed Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"

      - name: Build and package the .dmg
        run: bash scripts/package.sh

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" Horizon.dmg \
            --title "Horizon ${GITHUB_REF_NAME}" \
            --notes "Download Horizon.dmg, drag Horizon into Applications, and open it. First launch is blocked by macOS because the app is not notarized (that needs a paid Apple account): open System Settings > Privacy & Security > Security and click 'Open Anyway', then confirm with your password. See the README for screenshots and an optional Terminal one-liner. Note: this build uses a calm gradient with no bundled video/audio (the sample clips are license-restricted) — see the README to add your own."
